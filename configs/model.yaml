version: "2026-01"

gnn:
  model: "lightgcn"
  embedding_dim: 64
  num_layers: 3
  learning_rate: 0.001
  batch_size: 2048
  epochs: 100
  early_stopping_patience: 10
  negative_samples: 1
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

mlp:
  hidden_dims: [128, 64, 32]
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 256
  epochs: 50
  early_stopping_patience: 8
  weight_decay: 0.0001
  target_type: "regression"

profile_encoder:
  embedding_dim: 64
  hidden_dim: 128
  learning_rate: 0.001
  epochs: 30

optimizer:
  population_size: 100
  generations: 50
  seed: 42
  timeout_seconds: 10
  top_k_candidates: 100

shap:
  background_samples: 100
  max_evaluations: 200
